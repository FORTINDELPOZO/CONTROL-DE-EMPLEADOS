<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Guardia - Control de Acceso</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        .status-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; text-align: left; }
        .green { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .red { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .detail { font-size: 14px; margin-top: 10px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h1>Monitor de Ingreso</h1>
    <input type="text" id="dniInput" placeholder="Ingrese DNI del prestador" autofocus>
    <button onclick="buscarPrestador()">Consultar Estado</button>

    <div id="resultado" class="status-box"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwc4kPYiXY_68QkhNu6-ss6AJ2gsk7aQ5AQKGOm5RwLrQkgpwMuTf3XoWQLfqsSbSD4/exec";

    async function buscarPrestador() {
        const dni = document.getElementById('dniInput').value;
        const resDiv = document.getElementById('resultado');
        
        if (!dni) return alert("Por favor ingrese un DNI");

        resDiv.style.display = "block";
        resDiv.className = "status-box";
        resDiv.innerHTML = "Buscando en base de datos...";

        try {
            const response = await fetch(`${SCRIPT_URL}?dni=${dni}`);
            const data = await response.json();

            if (!data.encontrado) {
                resDiv.className = "status-box red";
                resDiv.innerHTML = "<strong>🔴 DENEGADO</strong><br>Persona no registrada.";
                return;
            }

            validarDocumentacion(data);
        } catch (e) {
            resDiv.innerHTML = "Error de conexión con el servidor.";
        }
    }

    function validarDocumentacion(data) {
        const resDiv = document.getElementById('resultado');
        const hoy = new Date();
        let alertas = [];

        // Función para validar vigencia de 1 año [cite: 61]
        const checkAnual = (fechaStr, nombreDoc) => {
            if (!fechaStr) return alertas.push(`Falta ${nombreDoc}`);
            const emision = new Date(fechaStr);
            const vto = new Date(emision);
            vto.setFullYear(vto.getFullYear() + 1);
            if (hoy > vto) alertas.push(`${nombreDoc} vencido (Emitido: ${new Date(fechaStr).toLocaleDateString()})`);
        };

        // Función para validar fecha de vencimiento literal [cite: 62]
        const checkVto = (fechaStr, nombreDoc) => {
            if (!fechaStr) return alertas.push(`Falta ${nombreDoc}`);
            if (hoy > new Date(fechaStr)) alertas.push(`${nombreDoc} vencido`);
        };

        checkAnual(data.fechas.antecedentes, "Antecedentes Penales");
        checkAnual(data.fechas.domicilio, "Certificado de Domicilio");
        checkAnual(data.fechas.autorizacion, "Autorización Propietario");
        checkVto(data.fechas.conducir, "Registro de Conducir");
        checkVto(data.fechas.seguro, "Seguro Vigente");

        if (alertas.length > 0) {
            resDiv.className = "status-box red";
            resDiv.innerHTML = `<strong>🔴 DENEGADO - ${data.nombre}</strong><br><div class="detail"><ul>${alertas.map(a => `<li>${a}</li>`).join('')}</ul></div>`;
        } else {
            resDiv.className = "status-box green";
            resDiv.innerHTML = `<strong>🟢 APROBADO - ${data.nombre}</strong><br>Documentación al día.`;
        }
    }
</script>
</body>
</html>
